<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
  </defs>
  <!-- Rounded background -->
  <rect width="32" height="32" rx="7" fill="url(#g)"/>
  <!-- Top layer (solid diamond — represents a textile sample) -->
  <polygon points="16,5.5 27.5,11.5 16,17.5 4.5,11.5" fill="white"/>
  <!-- Middle layer outline -->
  <polyline points="4.5,16.5 16,22.5 27.5,16.5" fill="none" stroke="rgba(255,255,255,0.68)" stroke-width="2.2" stroke-linejoin="round" stroke-linecap="round"/>
  <!-- Bottom layer outline -->
  <polyline points="4.5,21.5 16,27.5 27.5,21.5" fill="none" stroke="rgba(255,255,255,0.38)" stroke-width="2.2" stroke-linejoin="round" stroke-linecap="round"/>
</svg>
