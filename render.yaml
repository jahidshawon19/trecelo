databases:
  - name: sample-tracking-db
    databaseName: sample_tracking
    user: sample_tracking_user

services:
  - type: web
    name: sample-tracking-system
    runtime: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn sample_tracking_system.wsgi:application"
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: DATABASE_URL
        fromDatabase:
          name: sample-tracking-db
          property: connectionString
      - key: PYTHON_VERSION
        value: "3.13.0"
